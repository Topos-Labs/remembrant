name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Topos-Labs/infiniloom
          path: .infiniloom
      - name: Symlink infiniloom for path dependency
        run: ln -s "$GITHUB_WORKSPACE/.infiniloom" "$GITHUB_WORKSPACE/../infiniloom"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude remembrant-desktop
      - run: cargo test --workspace --exclude remembrant-desktop
      - run: cargo clippy --workspace --exclude remembrant-desktop -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Topos-Labs/infiniloom
          path: .infiniloom
      - name: Symlink infiniloom for path dependency
        run: ln -s "$GITHUB_WORKSPACE/.infiniloom" "$GITHUB_WORKSPACE/../infiniloom"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
